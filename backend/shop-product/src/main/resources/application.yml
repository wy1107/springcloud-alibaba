server:
  port: 8081

spring:
  application:
    name: service-product
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: onetwo12
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL5InnoDBDialect
  # Zipkin链路追踪配置
  zipkin:
    base-url: http://127.0.0.1:9411    # Zipkin Server地址
    sender:
      type: web                         # 使用HTTP方式发送追踪数据到Zipkin
  # Sleuth采样配置
  sleuth:
    sampler:
      probability: 1.0                  # 采样百分比（1.0=100%全采集，生产建议0.1~0.5）
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848  # Nacos服务注册中心地址
    sentinel:
      transport:
        dashboard: localhost:8858    # Sentinel控制台地址（已改为8858端口）
        port: 8719                   # Sentinel客户端与Dashboard通信端口（商品服务:8719）
      web-context-unify: false       # 关闭上下文合并，支持链路限流
